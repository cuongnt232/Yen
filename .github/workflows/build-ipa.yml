name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix project.yml encoding
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("project.yml")
          data = path.read_bytes()
          text = None

          if data.startswith(b"\xff\xfe"):
              text = data.decode("utf-16-le")
          elif data.startswith(b"\xfe\xff"):
              text = data.decode("utf-16-be")
          elif data.startswith(b"\xef\xbb\xbf"):
              text = data[3:].decode("utf-8")
          else:
              try:
                  text = data.decode("utf-8")
              except UnicodeDecodeError:
                  text = data.decode("utf-16-le")

          path.write_text(text.replace("\r\n", "\n"), encoding="utf-8")
          print(path.read_text(encoding="utf-8")[:200])
          PY

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project on Mac
        run: |
          xcodegen generate
          ls -la CellNetMonitor.xcodeproj
          xcodebuild -list -project CellNetMonitor.xcodeproj

      - name: Build unsigned app for device
        run: |
          set -euo pipefail
          xcodebuild \
            -project CellNetMonitor.xcodeproj \
            -scheme CellNetMonitor \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build 2>&1 | tee build.log

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/CellNetMonitor.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          cd dist
          zip -qr CellNetMonitor-unsigned.ipa Payload
          ls -lh dist/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CellNetMonitor-ipa
          path: dist/CellNetMonitor-unsigned.ipa
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
