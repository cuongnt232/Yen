name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build unsigned app for device
        run: |
          set -euo pipefail
          xcodebuild \
            -project CellNetMonitor.xcodeproj \
            -scheme CellNetMonitor \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/CellNetMonitor.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          cd dist
          zip -qr CellNetMonitor-unsigned.ipa Payload
          cd ..
          ls -lh dist/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CellNetMonitor-ipa
          path: dist/CellNetMonitor-unsigned.ipa
          if-no-files-found: error
